<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대로롱 주식</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 대로롱 주식 시장</h1>
            <p>현재 시장 상황을 실시간으로 확인하세요.</p>
        </header>

        <main>
            <section class="stock-info">
                <h2>현재가: <span id="current-price">500</span>D</h2>
                <p class="status">변동: <span id="price-change">0</span>D (<span id="price-percent">0</span>%)</p>
                
                <button id="update-btn" class="btn">📈 주가 변동시키기</button>
            </section>

            <section class="chart-container">
                <canvas id="stockChart"></canvas>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
